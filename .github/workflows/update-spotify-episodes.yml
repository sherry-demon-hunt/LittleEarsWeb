name: Update Spotify episodes

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-spotify-episodes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh Spotify episodes
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_MARKET: AU
          SPOTIFY_EPISODE_LIMIT: 5
        run: node scripts/update-spotify-episodes.mjs

      - name: Commit updated episode data
        run: |
          if git diff --quiet -- data/episodes.json; then
            echo "No episode changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/episodes.json
          git commit -m "Update Spotify episode data"
          git pull --rebase origin main
          git push
